steps:
  - label: ":construction_worker: Build"
    command: "scripts/build.sh"
    key: build
    env:
      BUILDKITE_AGENT_JOB_API_SOCKET: ""
      BUILDKITE_AGENT_JOB_API_TOKEN: ""
    plugins:
      - docker#v5.13.0:
          image: "python:3.13"
          always-pull: true
          propagate-uid-gid: true

  - label: ":white_check_mark: Test"
    command: "scripts/test.sh"
    key: test
    depends_on: build
    env:
      BUILDKITE_AGENT_JOB_API_SOCKET: ""
      BUILDKITE_AGENT_JOB_API_TOKEN: ""
    plugins:
      - docker#v5.13.0:
          image: "python:3.13"
          always-pull: true
          propagate-uid-gid: true

  - label: ":memo: Generate sentence"
    command: |
      python -c "import loremipsum; s=loremipsum.sentence(max_char=20); print(s); open('result.txt','w').write(s + '\\n')"
    key: generate_result
    depends_on: test
    env:
      BUILDKITE_AGENT_JOB_API_SOCKET: ""
      BUILDKITE_AGENT_JOB_API_TOKEN: ""
    artifact_paths:
      - result.txt
    plugins:
      - docker#v5.13.0:
          image: "python:3.13"
          always-pull: true
          propagate-uid-gid: true

  - label: ":writing_hand: Result 1"
    command: |
      buildkite-agent artifact download result.txt .
      cat << EOF | buildkite-agent annotate --style "info" --context "agent-cli-example"
      ### result.txt output

      \\`\\`\\`text
      $(cat result.txt)
      \\`\\`\\`
      EOF
    depends_on: generate_result

  - label: ":memo: Generate sentence round 2"
    command: |
      python -c "import loremipsum; s=loremipsum.sentence(max_char=100); print(s); open('result2.txt','w').write(s + '\\n')"
    key: generate_result_2
    depends_on: test
    env:
      BUILDKITE_AGENT_JOB_API_SOCKET: ""
      BUILDKITE_AGENT_JOB_API_TOKEN: ""
    artifact_paths:
      - result2.txt
    plugins:
      - docker#v5.13.0:
          image: "python:3.13"
          always-pull: true
          propagate-uid-gid: true

  - label: ":writing_hand: Result 2"
    command: |
      buildkite-agent artifact download result2.txt .
      cat << EOF | buildkite-agent annotate --style "info" --context "agent-cli-example-2"
      ### result2.txt output

      \\`\\`\\`text
      $(cat result2.txt)
      \\`\\`\\`
      EOF
    depends_on: generate_result_2

  - label: ":rocket: Deploy"
    command: |
      scripts/deploy.sh
      cat .buildkite/annotation.md | buildkite-agent annotate --style "success"
    key: deploy
    depends_on: generate_result
