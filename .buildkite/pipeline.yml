steps:
  - label: ":memo: Generate sentence"
    command: |
      python -c "import loremipsum; s=loremipsum.sentence(max_char=20); print(s); open('result.txt','w').write(s + '\\n')"
    key: generate_sentence
    artifact_paths:
      - result.txt
    plugins:
      - docker#v5.13.0:
          image: "python:3.13"
          always-pull: true
          propagate-uid-gid: true

  - label: ":writing_hand: Download / Print Result 1"
    key: download_result_1
    command: |
      buildkite-agent artifact download result.txt . --step generate_sentence
      ls -la result.txt
      RESULT_1="$(tr -d '\r\n' < result.txt)"
      if [ -z "$RESULT_1" ]; then RESULT_1="(result.txt was empty)"; fi
      buildkite-agent annotate --scope job --style "info" --context "agent-cli-example" "$(printf '### result.txt output\n\n%s' "$RESULT_1")"
    artifact_paths:
      - result.txt
    depends_on: generate_sentence

  - label: ":memo: Generate sentence round 2"
    command: |
      python -c "import loremipsum; s=loremipsum.sentence(max_char=100); print(s); open('result2.txt','w').write(s + '\\n')"
    key: generate_sentence_2
    depends_on: download_result_1
    artifact_paths:
      - result2.txt
    plugins:
      - docker#v5.13.0:
          image: "python:3.13"
          always-pull: true
          propagate-uid-gid: true

  - label: ":writing_hand: Download / Print Result 2"
    key: download_result_2
    command: |
      buildkite-agent artifact download result2.txt . --step generate_sentence_2
      ls -la result2.txt
      RESULT_2="$(tr -d '\r\n' < result2.txt)"
      if [ -z "$RESULT_2" ]; then RESULT_2="(result2.txt was empty)"; fi
      buildkite-agent annotate --scope job --style "info" --context "agent-cli-example-2" "$(printf '### result2.txt output\n\n%s' "$RESULT_2")"
    artifact_paths:
      - result2.txt
    depends_on: generate_sentence_2
